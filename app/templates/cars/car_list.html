{% extends 'base.html' %}

{% block header %}
    {{ title }}
{% endblock %}


{% block content %}

    <div class="cards-container" style="display: flex; flex-wrap: wrap; gap: 15px;">
        {% for car in cars %}
        <div class="card" style="min-width: 200px; flex: 1 1 200px;">
            <div class="card-body">
                <p class="card-text"><b>Марка: {{ car.marka }}</b></p>
                <p class="card-text"><b>Модель: {{ car.model }}</b></p>
                <p class="card-text"><b>Год выпуска: {{ car.year }}</b></p>
                <a href="{{ url_for('html_car_detail', car_id=car.id) }}" class="btn btn-primary">Подробнее</a>
            </div>
        </div>
        {% endfor %}
    </div>

{% endblock %}
